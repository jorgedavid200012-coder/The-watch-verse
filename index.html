<!DOCTYPE html>
<html>
<head>
<title>WEIRDMAGEDDON</title>

<style>

/* ---------- GLOBAL ---------- */
body{
margin:0;
background:black;
color:red;
font-family:Impact, sans-serif;
text-align:center;
overflow:hidden;
}

/* ---------- START BUTTON ---------- */
#startOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:red;
display:flex;
justify-content:center;
align-items:center;
font-size:70px;
cursor:pointer;
z-index:9999;
}

/* ---------- HERO SECTION ---------- */
#heroSection{
position:relative;
width:100%;
min-height:100vh;
overflow:hidden;
display:none;
}

#heroBg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* LOGO */
#logo{
position:relative;
z-index:1;
width:500px;
animation:floatRotate 4s ease-in-out infinite;
cursor:pointer;
}

@keyframes floatRotate{
0%{transform:translateY(0) rotate(0deg);}
25%{transform:translateY(-15px) rotate(-2deg);}
50%{transform:translateY(-25px) rotate(2deg);}
75%{transform:translateY(-15px) rotate(-1deg);}
100%{transform:translateY(0) rotate(0deg);}
}

/* ---------- COUNTDOWN ---------- */
#countdown{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
text-shadow:0 0 30px red;
animation:shake .2s infinite;
z-index:10000;
transition:transform .2s;
}

@keyframes shake{
0%{transform:translate(-50%,-50%) translate(3px,3px);}
50%{transform:translate(-50%,-50%) translate(-3px,-3px);}
100%{transform:translate(-50%,-50%) translate(3px,-3px);}
}

/* FLASH */
#flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:9999;
}

/* CONTENT */
#content{
position:relative;
z-index:1;
padding:40px;
animation:fadeIn 3s forwards;
color:red;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

button{
padding:15px 30px;
margin:20px;
font-size:20px;
background:black;
color:red;
border:2px solid red;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:red;
color:black;
}

/* SHOP */

.shop-container{
background:url('shopbg.png') no-repeat center center;
background-size:cover;
background-blend-mode:multiply;
background-color:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
margin-top:40px;
text-align:center;
position:relative;
z-index:1;
border:2px solid red;
}

.shop{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.item{
background:#3b2b1f;
color:#f5deb3;
padding:20px;
border:3px solid #a67c52;
cursor:pointer;
font-family:"Courier New", monospace;
transition:0.3s;
}

.item:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

/* OVERLAY */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
font-size:40px;
z-index:9999;
}

/* ERROR VIDEO FULLSCREEN */
#errorVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:100000;
}

/* HIDDEN MESSAGE */

#hiddenMessage{
position:fixed;
bottom:10px;
right:10px;
color:red;
opacity:0;
font-size:12px;
transition:1s;
}

/* ---------- RESPONSIVE ---------- */

video,img{
max-width:100%;
height:auto;
}

#trailerContainer video{
width:90%;
max-width:700px;
}

@media only screen and (max-width:1024px){

#logo{width:350px;}

#countdown{font-size:80px;}

button{
font-size:18px;
padding:12px 24px;
}

.shop{
flex-direction:column;
gap:15px;
}

}

</style>
</head>

<body>

<div id="startOverlay">START</div>
<div id="countdown"></div>
<div id="flash"></div>

<div id="heroSection">

<video id="heroBg" autoplay muted loop>
<source src="backgroundVideo.mp4" type="video/mp4">
</video>

<div id="content">

<h1>WEIRDMAGEDDON</h1>

<img id="logo" src="logo.png">

<div id="trailerContainer" style="margin-top:20px;">
<video width="700" controls>
<source src="trailer.mp4" type="video/mp4">
</video>
</div>

<hr style="margin:60px 0;border-color:red;">

<div class="shop-container">

<img src="shoplogo.png" width="400">

<h2>La Roaches Things & Stuff</h2>
<p>"If it survived the apocalypse, we sell it."</p>

<div class="shop">

<div class="item" onclick="playBuySound();rickroll()">🪳 Roach Jerky – $12</div>

<div class="item" onclick="playBuySound();rickroll()">🔫 Rusted Revolver – $999</div>

<div class="item" onclick="playBuySound();rickroll()">👁️ Weird Amulet – $666</div>

</div>
</div>

<hr style="margin:60px 0;border-color:red;">

<h2>Enter Secret Code</h2>

<input type="text" id="secretInput" placeholder="Type code..."
style="padding:10px;font-size:18px;background:black;color:red;border:2px solid red;">

<button onclick="checkSecret()">UNLOCK</button>

<div id="secretReveal" style="margin-top:30px;"></div>

</div>
</div>

<div id="overlay">Processing Transaction...</div>

<div id="hiddenMessage">THE EYE IS WATCHING</div>

<audio id="glitchSound" src="glitch.mp3"></audio>
<audio id="bgMusic" src="background.mp3" loop></audio>
<audio id="buySound" src="cash.mp3"></audio>
<audio id="secretSound" src="secret.mp3"></audio>

<video id="errorVideo" src="error.mp4" style="display:none;"></video>

<script>

/* START SCREEN */

const startOverlay=document.getElementById('startOverlay')
const countdownEl=document.getElementById('countdown')

const countdownNumbers=["3","2","1","GO!"]
let countIndex=0

startOverlay.addEventListener('click',()=>{
startOverlay.style.display='none'
showCountdown()
})

function showCountdown(){

countdownEl.innerHTML=countdownNumbers[countIndex]

countdownEl.style.transform="translate(-50%,-50%) scale(1.4)"

setTimeout(()=>{
countdownEl.style.transform="translate(-50%,-50%) scale(1)"
},200)

countIndex++

if(countIndex<countdownNumbers.length){

setTimeout(showCountdown,1000)

}else{

revealContent()

}

}

/* REVEAL */

function revealContent(){

countdownEl.style.display="none"

document.body.style.animation="glitch .2s infinite"

setTimeout(()=>{

document.body.style.animation=""

},2000)

let flash=document.getElementById("flash")

flash.style.opacity=1

setTimeout(()=>flash.style.opacity=0,300)

document.getElementById("glitchSound").play()

fadeInMusic(document.getElementById("bgMusic"),10000,0.15)

setTimeout(()=>{

document.getElementById("heroSection").style.display="block"

document.body.style.overflow="auto"

},800)

}

/* MUSIC FADE */

function fadeInMusic(audio,duration=10000,targetVolume=0.15){

audio.volume=0
audio.play()

const stepTime=100
const stepVolume=targetVolume/(duration/stepTime)

const fade=setInterval(()=>{

if(audio.volume+stepVolume<targetVolume){

audio.volume+=stepVolume

}else{

audio.volume=targetVolume
clearInterval(fade)

}

},stepTime)

}

/* SHOP */

function playBuySound(){

document.getElementById("buySound").play()

}

function rickroll(){

document.getElementById("overlay").style.display="flex"

setTimeout(()=>{

window.location.href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"

},2000)

}

/* LOGO EASTER EGG */

let logoClickCount=0

window.addEventListener("load",function(){

const logo=document.getElementById("logo")

if(logo){

logo.addEventListener("click",()=>{

logoClickCount++

if(logoClickCount===5){

window.location.href="https://youtu.be/-RbkipgjqlU"

}

})

}

})

/* ERROR VIDEO */

let pageClickCount=0

document.addEventListener('click',function(e){

if(e.target.tagName!=='BUTTON' && e.target.tagName!=='INPUT' && e.target.tagName!=='VIDEO'){

pageClickCount++

if(pageClickCount===20){

showErrorVideo()

pageClickCount=0

}

}

})

function showErrorVideo(){

const errVideo=document.getElementById("errorVideo")

errVideo.style.display="block"

errVideo.play()

errVideo.onended=()=>{location.reload()}

}

/* SECRET CODES */

function checkSecret(){

let code=document.getElementById("secretInput").value.toLowerCase()

let reveal=document.getElementById("secretReveal")

if(code==="apocalypse"){

window.location.href="game.html"

}

else if(code==="weirdmageddon"){

breakReality()

}

else{

reveal.innerHTML="<p>Access Denied.</p>"

}

}

/* REALITY BREAK */

function breakReality(){

document.body.style.animation="glitch .2s infinite"

document.body.style.background="red"

let overlay=document.createElement("div")

overlay.style.position="fixed"
overlay.style.top="0"
overlay.style.left="0"
overlay.style.width="100%"
overlay.style.height="100%"
overlay.style.background="black"
overlay.style.color="white"
overlay.style.display="flex"
overlay.style.alignItems="center"
overlay.style.justifyContent="center"
overlay.style.fontSize="50px"

overlay.innerHTML="REALITY CORRUPTED"

document.body.appendChild(overlay)

setTimeout(()=>overlay.innerHTML="SYSTEM FAILURE",2000)

setTimeout(()=>overlay.innerHTML="YOU SHOULDN'T HAVE DONE THAT",4000)

}

/* GLITCH KEYFRAMES */

let style=document.createElement('style')

style.innerHTML=`
@keyframes glitch{
0%{transform:translate(2px,2px);}
25%{transform:translate(-2px,-2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,2px);}
100%{transform:translate(2px,2px);}
}`

document.head.appendChild(style)

/* RANDOM WHISPERS */

setInterval(()=>{

if(Math.random()<0.05){

let whisper=new Audio("whisper.mp3")
whisper.volume=0.2
whisper.play()

}

},15000)

/* SCROLL MESSAGE */

window.addEventListener("scroll",()=>{

if(window.scrollY>300){

document.getElementById("hiddenMessage").style.opacity=1

}

})

</script>

</body>
</html>
