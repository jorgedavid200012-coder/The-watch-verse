<!DOCTYPE html>
<html>
<head>
<title>WEIRDGEDDON</title>

<style>
body{
  margin:0;
  background:black;
  color:red;
  font-family:Impact, sans-serif;
  text-align:center;
  overflow:hidden;
}

/* START BUTTON OVERLAY */
#startOverlay{
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:black;
  color:red;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:70px;
  cursor:pointer;
  z-index:9999;
}

/* COUNTDOWN */
#countdown{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  text-shadow:0 0 30px red;
  animation:shake .2s infinite;
}

/* SHAKE */
@keyframes shake{
  0%{transform:translate(-50%,-50%) translate(3px,3px);}
  50%{transform:translate(-50%,-50%) translate(-3px,-3px);}
  100%{transform:translate(-50%,-50%) translate(3px,-3px);}
}

/* FLASH */
#flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* CONTENT */
#content{
  display:none;
  padding:40px;
  animation:fadeIn 3s forwards;
}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}

button{
  padding:15px 30px;
  margin:20px;
  font-size:20px;
  background:black;
  color:red;
  border:2px solid red;
  cursor:pointer;
  transition:0.2s;
}
button:hover{background:red; color:black;}

/* SHOP */
.shop-container {
  background-image:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("shopbg.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  padding:40px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.8) inset;
  margin-top:40px;
  text-align:center;
}
.shop {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}
.item{
  background:#3b2b1f;
  color:#f5deb3;
  padding:20px;
  border:3px solid #a67c52;
  cursor:pointer;
  font-family:"Courier New", monospace;
  transition:0.3s;
}
.item:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px red;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:black;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
</style>
</head>

<body>

<!-- Start overlay -->
<div id="startOverlay">START</div>

<!-- Countdown and flash -->
<div id="countdown"></div>
<div id="flash"></div>

<!-- Main content -->
<div id="content">

  <img src="logo.png" width="500">
  <h1>WEIRDGEDDON</h1>

  <video width="700" controls>
    <source src="trailer.mp4" type="video/mp4">
  </video>

  <br>
  <button onclick="location.href='game.html'">PLAY GAME</button>

  <hr style="margin:60px 0; border-color:red;">

  <div class="shop-container">
    <img src="shoplogo.png" width="400">
    <h2>La Roaches Things & Stuff</h2>
    <p>"If it survived the apocalypse, we sell it."</p>

    <div class="shop">
      <div class="item" onclick="playBuySound(); rickroll()">🪳 Roach Jerky – $12</div>
      <div class="item" onclick="playBuySound(); rickroll()">🔫 Rusted Revolver – $999</div>
      <div class="item" onclick="playBuySound(); rickroll()">👁️ Weird Amulet – $666</div>
    </div>
  </div>

  <hr style="margin:60px 0; border-color:red;">

  <h2>Enter Secret Code</h2>
  <input type="text" id="secretInput" placeholder="Type code..." 
  style="padding:10px; font-size:18px; background:black; color:red; border:2px solid red;">
  <button onclick="checkSecret()">UNLOCK</button>

  <div id="secretReveal" style="margin-top:30px;"></div>
</div>

<div id="overlay">Processing Transaction...</div>

<!-- AUDIO -->
<audio id="glitchSound" src="glitch.mp3"></audio>
<audio id="bgMusic" src="background.mp3" loop></audio>
<audio id="buySound" src="cash.mp3"></audio>
<audio id="secretSound" src="secret.mp3"></audio>

<script>
const startOverlay = document.getElementById('startOverlay');
const countdownEl = document.getElementById('countdown');
const countdownNumbers = ["3","2","1","GO!"];
let countIndex = 0;

startOverlay.addEventListener('click', () => {
  startOverlay.style.display = 'none';
  showCountdown();
  // start glitch sound fade-in or background music after countdown
});

function showCountdown(){
  countdownEl.innerText = countdownNumbers[countIndex];
  countIndex++;
  if(countIndex < countdownNumbers.length){
    setTimeout(showCountdown, 1000);
  } else {
    revealContent();
  }
}

function revealContent(){
  countdownEl.style.display = "none";

  let flash = document.getElementById("flash");
  flash.style.opacity = 1;
  setTimeout(()=>flash.style.opacity=0, 300);

  // glitch sound
  const glitchSound = document.getElementById("glitchSound");
  if(glitchSound) glitchSound.play();

  // start progressive background music
  const bgMusic = document.getElementById("bgMusic");
  if(bgMusic){
    fadeInMusic(bgMusic, 10000, 0.3); // 10 second fade to 30% volume
  }

  setTimeout(()=>{
    document.getElementById("content").style.display = "block";
    document.body.style.overflow = "auto";
  },800);
}

/* progressive fade-in function */
function fadeInMusic(audio, duration = 10000, targetVolume = 0.3){
  audio.volume = 0;
  audio.play();
  const stepTime = 100;
  const stepVolume = targetVolume / (duration / stepTime);

  const fade = setInterval(()=>{
    if(audio.volume + stepVolume < targetVolume){
      audio.volume += stepVolume;
    } else {
      audio.volume = targetVolume;
      clearInterval(fade);
    }
  }, stepTime);
}

/* SHOP SOUND */
function playBuySound(){
  const buySound = document.getElementById("buySound");
  if(buySound) buySound.play();
}

/* SHOP RICKROLL */
function rickroll(){
  document.getElementById("overlay").style.display="flex";
  setTimeout(()=>{
    window.location.href="https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  },2000);
}

/* SECRET CODES */
function checkSecret(){
  let code=document.getElementById("secretInput").value.toLowerCase();
  let reveal=document.getElementById("secretReveal");

  if(code==="animalcrossing"){
    const secretSound = document.getElementById("secretSound");
    if(secretSound) secretSound.play();
    reveal.innerHTML=`
      <h3>Secret World Unlocked</h3>
      <canvas id="secretGame" width="600" height="400" 
      style="border:3px solid red; background:black;"></canvas>
      <p>Use arrow keys to move.</p>
    `;
    startMiniGame();
  }
  else if(code==="mario"){
    document.getElementById("secretSound").play();
    reveal.innerHTML="<img src='secret2.png' width='500'>";
  }
  else if(code==="blox"){
    document.getElementById("secretSound").play();
    reveal.innerHTML="<img src='secret3.png' width='500'>";
  }
  else if(code==="sonic"){
    document.getElementById("secretSound").play();
    reveal.innerHTML="<img src='secret4.png' width='500'>";
  }
  else if(code==="kong"){
    document.getElementById("secretSound").play();
    reveal.innerHTML="<img src='secret5.png' width='500'>";
  }
  else if(code==="weirdgeddon"){
    breakReality();
  }
  else{
    reveal.innerHTML="<p>Access Denied.</p>";
  }
}

/* MINI GAME */
function startMiniGame(){
  let canvas=document.getElementById("secretGame");
  let ctx=canvas.getContext("2d");
  let player={x:300,y:200,size:20};
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowUp") player.y-=10;
    if(e.key==="ArrowDown") player.y+=10;
    if(e.key==="ArrowLeft") player.x-=10;
    if(e.key==="ArrowRight") player.x+=10;
    draw();
  });
  function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,600,400);
    ctx.fillStyle="yellow";
    ctx.fillRect(player.x,player.y,player.size,player.size);
    ctx.fillStyle="red";
    ctx.fillText("Hidden Dimension", 200, 30);
  }
  draw();
}

/* BREAK REALITY */
function breakReality(){
  document.body.style.animation="glitch 0.2s infinite";
  document.body.style.background="red";

  let overlay=document.createElement("div");
  overlay.style.position="fixed";
  overlay.style.top="0"; overlay.style.left="0";
  overlay.style.width="100%"; overlay.style.height="100%";
  overlay.style.background="black"; overlay.style.color="white";
  overlay.style.display="flex"; overlay.style.alignItems="center";
  overlay.style.justifyContent="center"; overlay.style.fontSize="50px";
  overlay.innerHTML="REALITY CORRUPTED";
  document.body.appendChild(overlay);

  setTimeout(()=>overlay.innerHTML="SYSTEM FAILURE",2000);
  setTimeout(()=>overlay.innerHTML="YOU SHOULDN'T HAVE DONE THAT",4000);
}

/* GLITCH ANIMATION */
let style=document.createElement('style');
style.innerHTML=`
@keyframes glitch{
0%{transform:translate(2px,2px);}
25%{transform:translate(-2px,-2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,2px);}
100%{transform:translate(2px,2px);}
}`;
document.head.appendChild(style);

</script>

</body>
</html>
