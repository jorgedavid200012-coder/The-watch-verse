<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Watch Verse</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:'Press Start 2P',cursive;
touch-action:none;
}

canvas{
position:absolute;
top:0;
left:0;
image-rendering:pixelated;
}

/* MENU */

#ui{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:10;
}

button{
font-family:'Press Start 2P';
padding:16px;
margin:10px;
border:3px solid white;
background:black;
color:white;
cursor:pointer;
}

#preview{
display:flex;
gap:40px;
margin-top:20px;
}

.previewChar img{
width:80px;
height:80px;
image-rendering:pixelated;
}

/* MOBILE CONTROLS */

#mobileControls{
position:absolute;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:space-between;
padding:20px;
z-index:20;
}

.mobileLeft,.mobileRight{
display:flex;
gap:10px;
}

.mobileBtn{
width:70px;
height:70px;
border:3px solid white;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
}

</style>
</head>

<body>

<div id="ui">

<h1>WATCH VERSE</h1>

<div id="menu">
<button onclick="openSelect()">START</button>
</div>

<div id="select" style="display:none">

<h3>Choose Character</h3>

<div id="preview">

<div class="previewChar">
<img src="idle.png">
<br>
<button onclick="chooseCharacter('villigear')">VILLIGEAR</button>
</div>

<div class="previewChar">
<img src="sonicidle.png">
<br>
<button onclick="chooseCharacter('sonic')">SONIC</button>
</div>

<div class="previewChar">
<img src="marioidle.png">
<br>
<button onclick="chooseCharacter('mario')">MARIO</button>
</div>

</div>

</div>

</div>


<canvas id="game"></canvas>


<!-- MOBILE CONTROLS -->

<div id="mobileControls">

<div class="mobileLeft">
<div class="mobileBtn" id="left">◀</div>
<div class="mobileBtn" id="right">▶</div>
</div>

<div class="mobileRight">
<div class="mobileBtn" id="jump">▲</div>
<div class="mobileBtn" id="crouch">▼</div>
</div>

</div>


<script>

/* CANVAS */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)



/* GAME STATE */

let state="menu"



/* BACKGROUND */

const bg=new Image()
bg.src="background.png"



/* GROUND POSITION */

const GROUND_OFFSET=120



/* SPRITE SIZE */

const SPRITE_W=80
const SPRITE_H=80



/* PLAYER */

let character=null

let sprites={}

let player={
x:200,
y:200,
vx:0,
vy:0,
speed:0,
dir:1,
ground:false,
frame:0
}

let cameraX=0



/* CHARACTER STATS */

const stats={
villigear:{speed:0.6,jump:16,max:6},
sonic:{speed:0.12,jump:14,max:12},
mario:{speed:0.6,jump:20,max:6}
}



/* INPUT */

const keys={}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})



/* MOBILE CONTROLS */

function hold(btn,key){

btn.addEventListener("touchstart",e=>{
e.preventDefault()
keys[key]=true
})

btn.addEventListener("touchend",e=>{
e.preventDefault()
keys[key]=false
})

}

hold(document.getElementById("left"),"arrowleft")
hold(document.getElementById("right"),"arrowright")
hold(document.getElementById("jump")," ")
hold(document.getElementById("crouch"),"arrowdown")



/* MENU */

function openSelect(){
document.getElementById("menu").style.display="none"
document.getElementById("select").style.display="block"
state="select"
}



/* CHARACTER SELECT */

function chooseCharacter(name){

character=name
loadSprites()

document.getElementById("ui").style.display="none"

state="game"

}



/* IMAGE PRELOAD (fixes mobile loading) */

function loadImage(src){
let img=new Image()
img.src=src
return img
}



/* LOAD SPRITES */

function loadSprites(){

sprites={

idle:null,
walk1:null,
walk2:null,
jump:null,
crouch:null,
damaged:null,
run:null

}

if(character==="villigear"){

sprites.idle=loadImage("idle.png")
sprites.walk1=loadImage("walk1.png")
sprites.walk2=loadImage("walk2.png")
sprites.jump=loadImage("jump.png")
sprites.crouch=loadImage("crouch.png")
sprites.damaged=loadImage("damaged.png")

}

else{

sprites.idle=loadImage(character+"idle.png")
sprites.walk1=loadImage(character+"walk1.png")
sprites.walk2=loadImage(character+"walk2.png")
sprites.jump=loadImage(character+"jump.png")
sprites.crouch=loadImage(character+"crouch.png")
sprites.damaged=loadImage(character+"damaged.png")

}

if(character==="sonic"){
sprites.run=loadImage("sonicrun.png")
}

}



/* UPDATE */

function update(){

let s=stats[character]

let crouching=(keys["arrowdown"]||keys["s"]) && player.ground



if(!crouching){

if(keys["arrowright"]||keys["d"]){
player.speed+=s.speed
player.dir=1
}

else if(keys["arrowleft"]||keys["a"]){
player.speed-=s.speed
player.dir=-1
}

else{
player.speed*=0.9
}

}

player.speed=Math.max(-s.max,Math.min(s.max,player.speed))
player.vx=player.speed



/* JUMP */

if((keys[" "]||keys["arrowup"]) && player.ground){

player.vy=-s.jump
player.ground=false

}



/* GRAVITY */

player.vy+=0.8

player.x+=player.vx
player.y+=player.vy



/* GROUND */

let ground=canvas.height-GROUND_OFFSET

if(player.y>ground){

player.y=ground
player.vy=0
player.ground=true

}



/* CAMERA */

cameraX=player.x-canvas.width/2

}



/* SPRITE SELECT */

function getSprite(){

let crouching=(keys["arrowdown"]||keys["s"]) && player.ground

if(crouching) return sprites.crouch

if(!player.ground) return sprites.jump

if(Math.abs(player.vx)>1){

if(character==="sonic" && Math.abs(player.speed)>stats.sonic.max*0.8){
return sprites.run
}

if(character==="sonic")
player.frame+=0.3
else
player.frame+=0.1

if(Math.floor(player.frame)%2==0)
return sprites.walk1
else
return sprites.walk2

}

return sprites.idle

}



/* DRAW BACKGROUND */

function drawBackground(){

if(!bg.complete) return

let w=bg.width

let start=-cameraX%w

for(let i=-2;i<5;i++){
ctx.drawImage(bg,start+i*w,0,w,canvas.height)
}

}



/* DRAW PLAYER */

function drawPlayer(){

let img=getSprite()

if(!img || !img.complete) return

ctx.save()

ctx.translate(player.x-cameraX,player.y)

if(player.dir==-1)
ctx.scale(-1,1)

ctx.drawImage(
img,
-SPRITE_W/2,
-SPRITE_H,
SPRITE_W,
SPRITE_H
)

ctx.restore()

}



/* LOOP */

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()

if(state==="game"){
update()
drawPlayer()
}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
