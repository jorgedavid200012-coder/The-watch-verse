<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Watch Verse</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:'Press Start 2P',cursive;
touch-action:none;
}

canvas{
position:absolute;
top:0;
left:0;
image-rendering:pixelated;
}

/* MENU */

#ui{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
z-index:10;
}

button{
font-family:'Press Start 2P';
padding:18px;
margin:10px;
background:black;
color:white;
border:3px solid white;
cursor:pointer;
}

#preview{
display:flex;
gap:40px;
margin-top:30px;
}

.previewChar img{
width:80px;
height:80px;
image-rendering:pixelated;
}


/* MOBILE CONTROLS */

#mobileControls{
position:absolute;
bottom:20px;
left:0;
right:0;
display:none;
justify-content:space-between;
padding:20px;
z-index:20;
}

.mobileLeft{
display:flex;
gap:10px;
}

.mobileRight{
display:flex;
gap:10px;
}

.mobileBtn{
width:75px;
height:75px;
background:black;
color:white;
border:3px solid white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
image-rendering:pixelated;
}

</style>
</head>


<body>

<div id="ui">

<h1>WATCH VERSE</h1>

<div id="menu">
<button onclick="openSelect()">START</button>
</div>

<div id="select" style="display:none">

<h2>Choose Character</h2>

<div id="preview">

<div class="previewChar">
<img src="idle.png">
<button onclick="chooseCharacter('villigear')">VILLIGEAR</button>
</div>

<div class="previewChar">
<img src="sonicidle.png">
<button onclick="chooseCharacter('sonic')">SONIC</button>
</div>

<div class="previewChar">
<img src="marioidle.png">
<button onclick="chooseCharacter('mario')">MARIO</button>
</div>

</div>

</div>

<!-- LEVEL SELECT -->

<div id="levels" style="display:none">

<h2>Select Level</h2>

<button onclick="startLevel(1)">LEVEL 1</button>
<button>LEVEL 2</button>
<button>LEVEL 3</button>
<button>LEVEL 4</button>
<button>LEVEL 5</button>

</div>

</div>


<canvas id="game"></canvas>


<!-- MOBILE CONTROLS -->

<div id="mobileControls">

<div class="mobileLeft">
<div class="mobileBtn" id="left">◀</div>
<div class="mobileBtn" id="right">▶</div>
</div>

<div class="mobileRight">
<div class="mobileBtn" id="jump">▲</div>
<div class="mobileBtn" id="crouch">▼</div>
</div>

</div>



<script>

/* SHOW MOBILE CONTROLS ONLY ON TOUCH DEVICES */

if("ontouchstart" in window){
document.getElementById("mobileControls").style.display="flex"
}

/* CANVAS */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)



/* GAME STATE */

let state="menu"



/* LEVEL SYSTEM */

let currentLevel=0



/* BACKGROUND */

const bg=new Image()
bg.src="backround.png"



/* GROUND POSITION */

const GROUND_OFFSET=120



/* SPRITE SIZE */

const SPRITE_WIDTH=80
const SPRITE_HEIGHT=80



/* PLAYER */

let character=null
let sprites={}

let player={
x:200,
y:200,
vx:0,
vy:0,
speed:0,
dir:1,
ground:false,
frame:0
}

let cameraX=0



/* CHARACTER STATS */

const stats={

villigear:{speed:0.6,jump:16,max:6},

sonic:{speed:0.12,jump:14,max:12},

mario:{speed:0.6,jump:20,max:6}

}



/* INPUT */

const keys={}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})



/* MOBILE INPUT */

function hold(btn,key){

btn.addEventListener("touchstart",e=>{
e.preventDefault()
keys[key]=true
})

btn.addEventListener("touchend",e=>{
e.preventDefault()
keys[key]=false
})

}

hold(document.getElementById("left"),"arrowleft")
hold(document.getElementById("right"),"arrowright")
hold(document.getElementById("jump")," ")
hold(document.getElementById("crouch"),"arrowdown")



/* MENU */

function openSelect(){
document.getElementById("menu").style.display="none"
document.getElementById("select").style.display="block"
state="select"
}



/* CHARACTER SELECT */

function chooseCharacter(name){

character=name
loadSprites()

document.getElementById("select").style.display="none"
document.getElementById("levels").style.display="block"

state="levelselect"

}



/* START LEVEL */

function startLevel(num){

currentLevel=num

document.getElementById("ui").style.display="none"

player.x=200
player.y=200
player.vx=0
player.vy=0

state="game"

}



/* LOAD SPRITES */

function loadSprites(){

sprites={

idle:new Image(),
walk1:new Image(),
walk2:new Image(),
jump:new Image(),
crouch:new Image(),
damaged:new Image(),
run:new Image()

}

if(character==="villigear"){

sprites.idle.src="idle.png"
sprites.walk1.src="walk1.png"
sprites.walk2.src="walk2.png"
sprites.jump.src="jump.png"
sprites.crouch.src="crouch.png"
sprites.damaged.src="damaged.png"

}

else{

sprites.idle.src=character+"idle.png"
sprites.walk1.src=character+"walk1.png"
sprites.walk2.src=character+"walk2.png"
sprites.jump.src=character+"jump.png"
sprites.crouch.src=character+"crouch.png"
sprites.damaged.src=character+"damaged.png"

}

if(character==="sonic"){
sprites.run.src="sonicrun.png"
}

}



/* UPDATE */

function update(){

let s=stats[character]

let crouching=(keys["arrowdown"]||keys["s"]) && player.ground

/* MOVEMENT */

if(!crouching){

if(keys["arrowright"]||keys["d"]){

player.speed+=s.speed
player.dir=1

}

else if(keys["arrowleft"]||keys["a"]){

player.speed-=s.speed
player.dir=-1

}

else{

player.speed*=0.9

}

}

player.speed=Math.max(-s.max,Math.min(s.max,player.speed))
player.vx=player.speed



/* JUMP */

if((keys[" "]||keys["arrowup"]) && player.ground){

player.vy=-s.jump
player.ground=false

}



/* GRAVITY */

player.vy+=0.8

player.x+=player.vx
player.y+=player.vy



/* GROUND FIX */

let ground = canvas.height - GROUND_OFFSET - SPRITE_HEIGHT

if(player.y > ground){
player.y = ground
player.vy = 0
player.ground = true
}



/* CAMERA */

cameraX=player.x-canvas.width/2

}



/* SPRITE SELECTION */

function getSprite(){

let crouching=(keys["arrowdown"]||keys["s"]) && player.ground

if(crouching)
return sprites.crouch

if(!player.ground)
return sprites.jump

if(Math.abs(player.vx)>1){

if(character==="sonic" && Math.abs(player.speed)>stats.sonic.max*0.8){
return sprites.run
}

if(character==="sonic")
player.frame+=0.3
else
player.frame+=0.1

if(Math.floor(player.frame)%2==0)
return sprites.walk1
else
return sprites.walk2

}

return sprites.idle

}



/* DRAW BACKGROUND */

function drawBackground(){

if(!bg.complete) return

let w=bg.width

let start=-cameraX%w

for(let i=-2;i<5;i++){
ctx.drawImage(bg,start+i*w,0,w,canvas.height)
}

}



/* DRAW PLAYER */

function drawPlayer(){

let img=getSprite()

ctx.save()

ctx.translate(player.x-cameraX,player.y)

if(player.dir==-1)
ctx.scale(-1,1)

ctx.drawImage(
img,
-SPRITE_WIDTH/2,
-SPRITE_HEIGHT,
SPRITE_WIDTH,
SPRITE_HEIGHT
)

ctx.restore()

}



/* GAME LOOP */

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()

if(state==="game"){

update()
drawPlayer()

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
