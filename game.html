<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Weirdmageddon Game</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:'Press Start 2P', cursive;
color:white;
}

/* canvas */

canvas{
position:absolute;
top:0;
left:0;
}

/* TITLE SCREEN */

#titleOverlay{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.9);
z-index:10;
}

#gameTitle{
font-size:40px;
color:red;
margin-bottom:40px;
text-shadow:0 0 20px red;
}

#startButton{
padding:20px 40px;
font-size:18px;
background:black;
color:red;
border:3px solid red;
cursor:pointer;
}

#startButton:hover{
background:red;
color:black;
}

/* CHARACTER CHOOSER */

#charChooser{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9;
}

#characters{
display:flex;
gap:40px;
margin-top:30px;
}

.character{
cursor:pointer;
border:3px solid white;
padding:10px;
}

</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>

<div id="titleOverlay">

<div id="gameTitle">WEIRDMAGEDDON</div>

<button id="startButton">START</button>

</div>

<div id="charChooser">

<h2>Select Character</h2>

<div id="characters">

<div class="character" id="villagerSelect">
<img src="idle.png" width="80">
<p>Villager</p>
</div>

</div>

</div>

<script>

/* =====================
CANVAS SETUP
===================== */

const bgCanvas = document.getElementById("bgCanvas")
const bgCtx = bgCanvas.getContext("2d")

const gameCanvas = document.getElementById("gameCanvas")
const ctx = gameCanvas.getContext("2d")

function resize(){

bgCanvas.width = window.innerWidth
bgCanvas.height = window.innerHeight

gameCanvas.width = window.innerWidth
gameCanvas.height = window.innerHeight

}

window.addEventListener("resize",resize)
resize()

/* =====================
BACKGROUND
===================== */

const bg = new Image()
bg.src = "8bitbg.png"

let bgX = 0

function drawBackground(){

bgX -= 0.3

if(bgX <= -bgCanvas.width){
bgX = 0
}

bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height)

bgCtx.drawImage(bg,bgX,0,bgCanvas.width,bgCanvas.height)
bgCtx.drawImage(bg,bgX+bgCanvas.width,0,bgCanvas.width,bgCanvas.height)

}

/* =====================
PLAYER
===================== */

const idle = new Image()
idle.src = "idle.png"

let player = {

x:200,
y:200,
width:64,
height:64,
vy:0,
ground:false

}

const gravity = 0.8
const floorY = window.innerHeight - 120

function updatePlayer(){

player.vy += gravity
player.y += player.vy

if(player.y + player.height > floorY){

player.y = floorY - player.height
player.vy = 0
player.ground = true

}

}

function drawPlayer(){

ctx.drawImage(idle,player.x,player.y,player.width,player.height)

}

/* =====================
GAME LOOP
===================== */

function gameLoop(){

drawBackground()

ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height)

updatePlayer()
drawPlayer()

requestAnimationFrame(gameLoop)

}

/* =====================
START BUTTON FIX
===================== */

const startButton = document.getElementById("startButton")
const titleOverlay = document.getElementById("titleOverlay")
const charChooser = document.getElementById("charChooser")

startButton.addEventListener("click",function(){

titleOverlay.style.display = "none"
charChooser.style.display = "flex"

})

/* =====================
CHARACTER SELECT
===================== */

document.getElementById("villagerSelect").addEventListener("click",function(){

charChooser.style.display = "none"

gameLoop()

})

</script>

</body>
</html>
