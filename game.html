<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Watch Verse</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:'Press Start 2P',cursive;
color:white;
touch-action:none;
}

canvas{
position:absolute;
top:0;
left:0;
image-rendering:pixelated;
}

#ui{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

button{
font-family:'Press Start 2P';
padding:18px;
margin:10px;
font-size:12px;
background:black;
color:white;
border:3px solid white;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

#preview{
display:flex;
gap:40px;
margin-top:30px;
}

.previewChar{
text-align:center;
}

.previewChar img{
width:80px;
height:80px;
image-rendering:pixelated;
}

/* MOBILE CONTROLS */

#mobileControls{
position:absolute;
bottom:20px;
left:0;
width:100%;
display:none;
justify-content:space-between;
padding:0 30px;
box-sizing:border-box;
z-index:20;
}

.controlSide{
display:flex;
gap:20px;
}

.controlBtn{
width:70px;
height:70px;
background:black;
border:3px solid white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
image-rendering:pixelated;
user-select:none;
}

</style>
</head>


<body>

<div id="ui">

<h1>WATCH VERSE</h1>

<div id="menu">
<button onclick="openSelect()">START</button>
</div>

<div id="select" style="display:none">

<h2>Choose Character</h2>

<div id="preview">

<div class="previewChar">
<img src="idle.png">
<button onclick="chooseCharacter('villigear')">VILLIGEAR</button>
</div>

<div class="previewChar">
<img src="sonicidle.png">
<button onclick="chooseCharacter('sonic')">SONIC</button>
</div>

<div class="previewChar">
<img src="marioidle.png">
<button onclick="chooseCharacter('mario')">MARIO</button>
</div>

</div>

</div>

</div>


<canvas id="game"></canvas>


<!-- MOBILE CONTROLS -->

<div id="mobileControls">

<div class="controlSide">
<div class="controlBtn" id="left">◀</div>
<div class="controlBtn" id="right">▶</div>
</div>

<div class="controlSide">
<div class="controlBtn" id="jump">▲</div>
<div class="controlBtn" id="down">▼</div>
</div>

</div>


<script>

/* CANVAS */

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
}

resize()
window.addEventListener("resize",resize)


/* GAME STATE */

let state = "menu"


/* BACKGROUND */

const bg = new Image()
bg.src = "8bitbg.png"

let bgOffset = 0


/* FLOOR */

const floor = new Image()
floor.src = "floor.png"


/* PLAYER */

let character = null

let sprites = {}

let player = {

x:200,
y:200,

vx:0,
vy:0,

dir:1,

ground:false,

frame:0,

sonicSpeed:0

}

let cameraX = 0


/* CHARACTER STATS */

const stats = {

villigear:{speed:0.6,jump:16},
sonic:{speed:0.5,jump:14},
mario:{speed:0.6,jump:20},
bill:{speed:0.6,jump:16}

}


/* INPUT */

const keys = {}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false
})


/* MOBILE INPUT */

function bind(btn,key){

btn.addEventListener("touchstart",e=>{
e.preventDefault()
keys[key]=true
})

btn.addEventListener("touchend",e=>{
e.preventDefault()
keys[key]=false
})

}

bind(document.getElementById("left"),"arrowleft")
bind(document.getElementById("right"),"arrowright")
bind(document.getElementById("jump")," ")
bind(document.getElementById("down"),"arrowdown")


/* MENU */

function openSelect(){

document.getElementById("menu").style.display="none"
document.getElementById("select").style.display="block"

state = "select"

}


/* CHARACTER SELECT */

function chooseCharacter(name){

character = name

loadSprites()

document.getElementById("ui").style.display="none"

document.getElementById("mobileControls").style.display="flex"

state = "game"

}


/* LOAD SPRITES */

function loadSprites(){

sprites = {

idle:new Image(),
walk1:new Image(),
walk2:new Image(),
jump:new Image(),
crouch:new Image(),
damaged:new Image(),
run:new Image()

}

if(character==="villigear"){

sprites.idle.src="idle.png"
sprites.walk1.src="walk1.png"
sprites.walk2.src="walk2.png"
sprites.jump.src="jump.png"
sprites.crouch.src="crouch.png"
sprites.damaged.src="damaged.png"

}

else{

sprites.idle.src=character+"idle.png"
sprites.walk1.src=character+"walk1.png"
sprites.walk2.src=character+"walk2.png"
sprites.jump.src=character+"jump.png"
sprites.crouch.src=character+"crouch.png"
sprites.damaged.src=character+"damaged.png"

if(character==="sonic")
sprites.run.src="sonicrun.png"

}

}


/* UPDATE GAME */

function update(){

let s = stats[character]


if(keys["arrowright"] || keys["d"]){

if(character==="sonic"){

player.sonicSpeed += 0.05
if(player.sonicSpeed > 2.5) player.sonicSpeed = 2.5

player.vx += player.sonicSpeed

}else{

player.vx += s.speed

}

player.dir = 1

}


if(keys["arrowleft"] || keys["a"]){

if(character==="sonic"){

player.sonicSpeed += 0.05
if(player.sonicSpeed > 2.5) player.sonicSpeed = 2.5

player.vx -= player.sonicSpeed

}else{

player.vx -= s.speed

}

player.dir = -1

}


/* slow down sonic if not running */

if(character==="sonic" && !(keys["arrowright"]||keys["arrowleft"]||keys["a"]||keys["d"])){

player.sonicSpeed *= 0.9

}


/* slippery movement */

player.vx *= 0.9


/* jump */

if((keys[" "] || keys["arrowup"]) && player.ground){

player.vy = -s.jump
player.ground = false

}


/* gravity */

player.vy += 0.8

player.x += player.vx
player.y += player.vy


/* GROUND */

let ground = canvas.height - 40

if(player.y > ground){

player.y = ground
player.vy = 0
player.ground = true

}


/* camera */

cameraX = player.x - canvas.width/2

}


/* SPRITE SELECTION */

function getSprite(){

if(!player.ground)
return sprites.jump

if(keys["arrowdown"] || keys["s"])
return sprites.crouch


/* SONIC RUN SPRITE */

if(character==="sonic" && Math.abs(player.sonicSpeed) > 2){

return sprites.run

}


if(Math.abs(player.vx)>1){

if(character==="sonic")
player.frame += 0.25
else
player.frame += 0.08

if(Math.floor(player.frame)%2==0)
return sprites.walk1
else
return sprites.walk2

}

return sprites.idle

}


/* DRAW BACKGROUND */

function drawBackground(){

if(!bg.complete) return

let w = bg.width

if(state==="menu" || state==="select"){
bgOffset += 0.2
}

if(state==="game"){
bgOffset = cameraX * 0.5
}

let start = -bgOffset % w

for(let i=-2;i<5;i++){
ctx.drawImage(bg,start+i*w,0,w,canvas.height)
}

}


/* DRAW FLOOR */

function drawFloor(){

let tile = floor.width || 64

for(let i=-20;i<100;i++){

let x = i*tile - cameraX

if(floor.complete)
ctx.drawImage(floor,x,canvas.height-40)

}

}


/* DRAW PLAYER */

function drawPlayer(){

if(!character) return

let img = getSprite()

ctx.save()

ctx.translate(player.x-cameraX,player.y)

if(player.dir==-1)
ctx.scale(-1,1)

if(img && img.complete){

ctx.drawImage(img,-40,-80,80,80)

}

ctx.restore()

}


/* GAME LOOP */

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()

if(state==="game"){

update()

drawFloor()

drawPlayer()

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
