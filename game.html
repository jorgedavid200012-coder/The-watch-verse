<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Watch Verse</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:'Press Start 2P',cursive;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
image-rendering:pixelated;
}

#ui{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:2;
}

button{

font-family:'Press Start 2P';
padding:20px;
margin:10px;
font-size:14px;

background:black;
color:white;
border:3px solid white;

cursor:pointer;

}

button:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<div id="ui">

<h1>WATCH VERSE</h1>

<div id="menu">

<button onclick="startSelect()">START</button>

</div>

<div id="select" style="display:none">

<h2>Choose Character</h2>

<button onclick="choose('villigear')">VILLIGEAR</button>
<button onclick="choose('sonic')">SONIC</button>
<button onclick="choose('mario')">MARIO</button>

</div>

</div>

<canvas id="game"></canvas>

<script>

/* ---------- CANVAS ---------- */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){

canvas.width=window.innerWidth
canvas.height=window.innerHeight

}

resize()
window.addEventListener("resize",resize)


/* ---------- GAME STATE ---------- */

let state="menu"


/* ---------- CHARACTER ---------- */

let character="villigear"


/* ---------- LOAD IMAGE ---------- */

function load(src){

let img=new Image()
img.src=src
return img

}

const bg=load("8bitbg.png")
const floor=load("floor.png")


/* ---------- PLAYER ---------- */

let player={

x:200,
y:200,

vx:0,
vy:0,

dir:1,

ground:false,

frame:0

}

let gravity=0.8
let friction=0.9

let cameraX=0


/* ---------- STATS ---------- */

const stats={

villigear:{speed:0.6,jump:16},
sonic:{speed:1.1,jump:14},
mario:{speed:0.6,jump:20},
bill:{speed:0.6,jump:16,hover:true}

}


/* ---------- INPUT ---------- */

const keys={}

document.addEventListener("keydown",e=>{

keys[e.key.toLowerCase()]=true

})

document.addEventListener("keyup",e=>{

keys[e.key.toLowerCase()]=false

})


/* ---------- SPRITES ---------- */

let sprites={}

function loadSprites(){

sprites={

idle:load(character+"idle.png"),
walk1:load(character+"walk1.png"),
walk2:load(character+"walk2.png"),
jump:load(character+"jump.png"),
crouch:load(character+"crouch.png")

}

}


/* ---------- MENU ---------- */

function startSelect(){

document.getElementById("menu").style.display="none"
document.getElementById("select").style.display="block"

}

function choose(c){

character=c

loadSprites()

document.getElementById("ui").style.display="none"

state="game"

}


/* ---------- UPDATE ---------- */

function update(){

let s=stats[character]

if(keys["arrowright"]||keys["d"]){

player.vx+=s.speed
player.dir=1

}

if(keys["arrowleft"]||keys["a"]){

player.vx-=s.speed
player.dir=-1

}

player.vx*=friction

if((keys[" "]||keys["arrowup"]) && player.ground){

player.vy=-s.jump
player.ground=false

}

player.vy+=gravity

player.x+=player.vx
player.y+=player.vy


let ground=canvas.height-120

if(player.y>ground){

player.y=ground
player.vy=0
player.ground=true

}

cameraX=player.x-canvas.width/2

}


/* ---------- SPRITE SELECT ---------- */

function sprite(){

if(!player.ground) return sprites.jump

if(Math.abs(player.vx)>1){

player.frame+=0.2

if(Math.floor(player.frame)%2==0) return sprites.walk1
else return sprites.walk2

}

return sprites.idle

}


/* ---------- DRAW BG ---------- */

function drawBG(){

if(!bg.complete) return

let w=bg.width

let start=-cameraX%w

for(let i=-2;i<5;i++){

ctx.drawImage(bg,start+i*w,0,w,canvas.height)

}

}


/* ---------- DRAW FLOOR ---------- */

function drawFloor(){

let tile=floor.width||64

for(let i=-20;i<100;i++){

let x=i*tile-cameraX

if(floor.complete)
ctx.drawImage(floor,x,canvas.height-60)

}

}


/* ---------- DRAW PLAYER ---------- */

function drawPlayer(){

let img=sprite()

ctx.save()

ctx.translate(player.x-cameraX,player.y)

if(player.dir==-1) ctx.scale(-1,1)

if(img && img.complete){

ctx.drawImage(img,-40,-70,80,80)

}else{

ctx.fillStyle="red"
ctx.fillRect(-20,-40,40,40)

}

ctx.restore()

}


/* ---------- LOOP ---------- */

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBG()

if(state==="game"){

update()

drawFloor()

drawPlayer()

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
