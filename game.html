<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

canvas{
display:block;
}

#menu{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:black;
}

button{
font-size:20px;
padding:10px 20px;
margin:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="menu">
<h1>Character Select</h1>

<button onclick="startGame('villigear')">Villigear</button>
<button onclick="startGame('sonic')">Sonic</button>
<button onclick="startGame('mario')">Mario</button>
<button onclick="startGame('bill')">Bill</button>

</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let cameraX=0

const gravity=0.8
const friction=0.85

let character="villigear"

const stats={
villigear:{speed:4,jump:15},
sonic:{speed:7,jump:14},
mario:{speed:4,jump:19},
bill:{speed:4,jump:15,hover:180}
}

const spriteFiles={
villigear:{
idle:"idle.png",
walk1:"walk1.png",
walk2:"walk2.png",
jump:"jump.png",
crouch:"crouch.png"
},

sonic:{
idle:"sonicidle.png",
walk1:"sonicwalk1.png",
walk2:"sonicwalk2.png",
jump:"sonicjump.png",
crouch:"soniccrouch.png"
},

mario:{
idle:"marioidle.png",
walk1:"mariowalk1.png",
walk2:"mariowalk2.png",
jump:"mariojump.png",
crouch:"mariocrouch.png"
},

bill:{
idle:"billidle.png",
walk1:"billwalk1.png",
walk2:"billwalk2.png",
jump:"billjump.png",
crouch:"billcrouch.png"
}
}

const sprites={}

for(let c in spriteFiles){

sprites[c]={}

for(let s in spriteFiles[c]){

let img=new Image()
img.src=spriteFiles[c][s]

sprites[c][s]=img

}

}

const bg=new Image()
bg.src="background.png"

const floorImg=new Image()
floorImg.src="floor.png"

const player={

x:200,
y:0,

vx:0,
vy:0,

dir:1,

onGround:false,
crouch:false,

frame:0,

hover:0

}

const keys={}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

function startGame(c){

character=c

document.getElementById("menu").style.display="none"

player.y=canvas.height-100
player.hover=stats[c].hover||0

loop()

}

function getSprite(){

const set=sprites[character]

if(player.crouch) return set.crouch

if(!player.onGround) return set.jump

if(Math.abs(player.vx)>1){

player.frame+=0.2

if(Math.floor(player.frame)%2==0)
return set.walk1
else
return set.walk2

}

return set.idle

}

function update(){

let speed=stats[character].speed

if(keys["a"]||keys["arrowleft"]){

player.vx-=0.5
player.dir=-1

}

if(keys["d"]||keys["arrowright"]){

player.vx+=0.5
player.dir=1

}

if(keys["s"]||keys["arrowdown"]){

player.crouch=true
}else{
player.crouch=false
}

if((keys[" "]||keys["w"]||keys["arrowup"])){

if(player.onGround){

player.vy=-stats[character].jump
player.onGround=false

}else if(character==="bill" && player.hover>0){

player.vy=-2
player.hover--

}

}

player.vy+=gravity

player.x+=player.vx
player.y+=player.vy

player.vx*=friction

let ground=canvas.height-80

if(player.y>ground){

player.y=ground
player.vy=0
player.onGround=true

if(character==="bill")
player.hover=stats.bill.hover

}

cameraX=player.x-canvas.width/2

}

function drawBackground(){

if(bg.complete){

ctx.drawImage(bg,-cameraX*0.5,0,canvas.width*2,canvas.height)

}

}

function drawFloor(){

for(let x=-2000;x<20000;x+=64){

ctx.drawImage(floorImg,x-cameraX,canvas.height-64,64,64)

}

}

function drawPlayer(){

const img=getSprite()

ctx.save()

ctx.translate(player.x-cameraX,player.y)

if(player.dir==-1){
ctx.scale(-1,1)
}

const w=80
const h=80

ctx.drawImage(img,-w/2,-h,w,h)

ctx.restore()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()
drawFloor()
drawPlayer()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
