<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weirdmageddon: Apocalypse</title>
<style>
body, html { margin:0; padding:0; overflow:hidden; font-family:Arial, Helvetica, sans-serif; background:black; }
#titleScreen{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:url("8bitbg.png") center/cover no-repeat;
color:white;text-align:center;
}
#titleScreen h1{font-size:60px;margin-bottom:20px;text-shadow:0 0 15px red;}
#startBtn{padding:15px 40px;font-size:20px;cursor:pointer;}

#characterSelect{
position:absolute;width:100%;height:100%;display:none;
background:black;color:white;text-align:center;padding-top:120px;
}
.charBtn{padding:15px 25px;margin:10px;font-size:18px;cursor:pointer;}

#gameCanvas{display:none;background:#87CEEB;image-rendering:pixelated;}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="titleScreen">
<h1>Weirdmageddon</h1>
<button id="startBtn">Start Game</button>
</div>

<!-- CHARACTER SELECT -->
<div id="characterSelect">
<h2>Choose Character</h2>
<button class="charBtn" onclick="startGame('villager')">Villager</button>
<button class="charBtn" onclick="startGame('sonic')">Sonic</button>
<button class="charBtn" onclick="startGame('mario')">Mario</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* UI Screens */
document.getElementById("startBtn").onclick=()=>{
  document.getElementById("titleScreen").style.display="none";
  document.getElementById("characterSelect").style.display="block";
};

let player;
let cameraX=0;
const gravity=0.6;

/* Floor */
const floorImg=new Image();
floorImg.src="floor.png";
const floor={x:0, y:0, width:5000, height:64};

/* SPRITES */
const spritePaths={
  villager:{
    idle:"characters/villager/idle.png",
    walk1:"characters/villager/walk1.png",
    walk2:"characters/villager/walk2.png",
    jump:"characters/villager/jump.png",
    crouch:"characters/villager/crouch.png",
    damaged:"characters/villager/damaged.png"
  }
};

/* Load images */
const sprites={};
for(const char in spritePaths){
  sprites[char]={};
  for(const anim in spritePaths[char]){
    const img=new Image();
    img.src=spritePaths[char][anim];
    sprites[char][anim]=img;
  }
}

/* Start game */
function startGame(character){
  document.getElementById("characterSelect").style.display="none";
  canvas.style.display="block";
  floor.y=canvas.height-floor.height;

  player={
    x:100,
    y:floor.y-60,
    width:50,
    height:60,
    velX:0,
    velY:0,
    speed:4,
    jumpPower:-12,
    jumping:true,
    character:character,
    damaged:false,
    damageTimer:0
  };

  gameLoop();
}

/* Update */
function update(){
  // movement
  if(keys["ArrowRight"]||keys["d"]) player.velX=player.speed;
  else if(keys["ArrowLeft"]||keys["a"]) player.velX=-player.speed;
  else player.velX=0;

  // jump
  if((keys[" "]||keys["w"])&&!player.jumping){
    player.velY=player.jumpPower;
    player.jumping=true;
  }

  // gravity
  player.velY+=gravity;
  player.x+=player.velX;
  player.y+=player.velY;

  // floor collision
  if(player.y+player.height>=floor.y){
    player.y=floor.y-player.height;
    player.velY=0;
    player.jumping=false;
  }

  // simulate damage key H
  if(keys["h"] && !player.damaged){
    player.damaged=true;
    player.damageTimer=30; // frames to show damaged sprite
  }

  if(player.damaged){
    player.damageTimer--;
    if(player.damageTimer<=0) player.damaged=false;
  }

  // camera
  cameraX=player.x-canvas.width/2;
  if(cameraX<0) cameraX=0;
}

/* Draw */
let walkTimer=0;
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // draw floor
  for(let x=0;x<floor.width;x+=floor.height){
    ctx.drawImage(floorImg,floor.x+x-cameraX,floor.y,floor.height,floor.height);
  }

  // determine player sprite
  let img;
  const charSprites=sprites[player.character];

  if(player.damaged) img=charSprites.damaged;
  else if(player.jumping) img=charSprites.jump;
  else if(keys["ArrowLeft"]||keys["ArrowRight"]||keys["a"]||keys["d"]){
    walkTimer++;
    img=(walkTimer%20<10)?charSprites.walk1:charSprites.walk2;
  }
  else if(keys["s"]) img=charSprites.crouch; // crouch
  else img=charSprites.idle;

  ctx.drawImage(img,player.x-cameraX,player.y,player.width,player.height);
}

/* Loop */
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

</script>
</body>
</html>
