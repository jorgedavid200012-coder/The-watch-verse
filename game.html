<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Watch Verse</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

canvas{
display:block;
margin:auto;
background:black;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = 900
canvas.height = 500


/* ======================
ENGINE STATE
======================*/

let GAME = "menu"


/* ======================
INPUT
======================*/

let keys = {}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false
})


/* ======================
IMAGE LOADER
======================*/

function load(src){

let i = new Image()
i.src = src
return i

}


/* ======================
BACKGROUND
======================*/

const bg = load("8bitbg.png")
let bgScroll = 0

function drawBackground(){

bgScroll += 0.2

let w = bg.width

for(let i=-1;i<canvas.width/w+2;i++){

ctx.drawImage(bg,i*w-bgScroll%w,0,w,canvas.height)

}

}


/* ======================
SPRITES
======================*/

function spriteSet(name){

return{

idle:load(name+"idle.png"),
walk1:load(name+"walk1.png"),
walk2:load(name+"walk2.png"),
jump:load(name+"jump.png"),
crouch:load(name+"crouch.png")

}

}

const sprites = {

player:spriteSet("player"),
sonic:spriteSet("sonic"),
mario:spriteSet("mario"),
bill:spriteSet("bill")

}


/* ======================
CHARACTER STATS
======================*/

const chars = {

player:{speed:0.6,jump:12},
sonic:{speed:0.9,jump:12},
mario:{speed:0.6,jump:16},
bill:{speed:0.6,jump:11,hover:true}

}

let unlockedBill = false
let currentCharacter = "player"


/* ======================
PLAYER
======================*/

let player = {

x:100,
y:300,
vx:0,
vy:0,

w:60,
h:60,

ground:false,
facing:1,

hoverTimer:0

}


/* ======================
PHYSICS
======================*/

const gravity = 0.6
const friction = 0.85
const maxSpeed = 7
const floorY = 400


/* ======================
WORLD
======================*/

const floorImg = load("floor.png")
const goal = load("goal.png")

let goalX = 4500

let cameraX = 0


/* ======================
MENU
======================*/

function drawMenu(){

drawBackground()

ctx.fillStyle="white"
ctx.font="50px monospace"
ctx.fillText("WATCH VERSE",300,200)

ctx.font="20px monospace"
ctx.fillText("Press ENTER",380,260)

if(keys["enter"]) GAME="select"

}


/* ======================
CHARACTER SELECT
======================*/

function drawSelect(){

drawBackground()

ctx.fillStyle="white"
ctx.font="40px monospace"
ctx.fillText("Choose Character",300,150)

ctx.font="20px monospace"

ctx.fillText("1 Player",380,220)
ctx.fillText("2 Sonic (fast)",380,250)
ctx.fillText("3 Mario (high jump)",380,280)

if(unlockedBill)
ctx.fillText("4 Bill Cipher (hover)",380,310)

if(keys["1"]){currentCharacter="player";GAME="game"}
if(keys["2"]){currentCharacter="sonic";GAME="game"}
if(keys["3"]){currentCharacter="mario";GAME="game"}
if(keys["4"] && unlockedBill){currentCharacter="bill";GAME="game"}

}


/* ======================
PLAYER UPDATE
======================*/

function updatePlayer(){

let c = chars[currentCharacter]

/* movement */

if(keys["a"]||keys["arrowleft"]){

player.vx -= c.speed
player.facing = -1

}

if(keys["d"]||keys["arrowright"]){

player.vx += c.speed
player.facing = 1

}

player.vx *= friction

player.vx = Math.max(-maxSpeed,Math.min(maxSpeed,player.vx))


/* jump */

if((keys[" "]||keys["w"]||keys["arrowup"]) && player.ground){

player.vy = -c.jump
player.ground=false

}


/* crouch */

let crouching = keys["arrowdown"]||keys["s"]


/* bill hover */

if(c.hover){

if(!player.ground && (keys[" "]||keys["w"])){

if(player.hoverTimer < 180){

player.vy *= 0.6
player.hoverTimer++

}

}else{

player.hoverTimer=0

}

}


/* physics */

player.vy += gravity

player.x += player.vx
player.y += player.vy


if(player.y+player.h>=floorY){

player.y=floorY-player.h
player.vy=0
player.ground=true

}


/* camera */

cameraX = player.x-200

}


/* ======================
ANIMATION
======================*/

let walkFrame=0
let walkTimer=0

function getSprite(){

let s = sprites[currentCharacter]

let crouch = keys["arrowdown"]||keys["s"]

if(crouch) return s.crouch

if(!player.ground) return s.jump

if(Math.abs(player.vx)>1){

walkTimer++

if(walkTimer>10){

walkFrame = 1-walkFrame
walkTimer=0

}

return walkFrame? s.walk1 : s.walk2

}

return s.idle

}


/* ======================
DRAW PLAYER
======================*/

function drawPlayer(){

let img = getSprite()

ctx.save()

ctx.translate(player.x-cameraX+player.w/2,player.y+player.h/2)
ctx.scale(player.facing,1)

ctx.drawImage(img,-30,-30,60,60)

ctx.restore()

}


/* ======================
DRAW WORLD
======================*/

function drawWorld(){

drawBackground()

for(let i=-5;i<50;i++){

ctx.drawImage(floorImg,i*300-cameraX,floorY,300,100)

}

ctx.drawImage(goal,goalX-cameraX,340,80,80)

}


/* ======================
WIN
======================*/

function checkWin(){

if(player.x > goalX){

unlockedBill = true
GAME="select"

player.x=100
player.y=300

}

}


/* ======================
GAME LOOP
======================*/

function game(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(GAME==="menu") drawMenu()

if(GAME==="select") drawSelect()

if(GAME==="game"){

updatePlayer()

drawWorld()

drawPlayer()

checkWin()

}

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
