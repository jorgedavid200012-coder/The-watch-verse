<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weirdmageddon</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:'Press Start 2P', cursive;
}

canvas{
position:absolute;
top:0;
left:0;
}

#titleOverlay{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
z-index:10;
}

#gameTitle{
font-size:40px;
color:red;
margin-bottom:40px;
text-shadow:0 0 20px red;
}

#startButton{
padding:20px 40px;
font-size:18px;
background:black;
color:red;
border:3px solid red;
cursor:pointer;
}

#charChooser{
position:absolute;
width:100%;
height:100%;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
z-index:9;
color:white;
}

</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="titleOverlay">
<div id="gameTitle">WEIRDMAGEDDON</div>
<button id="startButton">START</button>
</div>

<div id="charChooser">
<h2>Select Character</h2>
<div id="villagerSelect" style="cursor:pointer">
<img src="idle.png" width="80">
<p>Villager</p>
</div>
</div>

<script>

/* CANVAS */

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
}
window.addEventListener("resize",resize)
resize()

/* IMAGES */

const bg = new Image()
bg.src="8bitbg.png"

const floorImg = new Image()
floorImg.src="floor.png"

const idle = new Image()
idle.src="idle.png"

const walk1 = new Image()
walk1.src="walk1.png"

const walk2 = new Image()
walk2.src="walk2.png"

const jump = new Image()
jump.src="jump.png"

const crouch = new Image()
crouch.src="crouch.png"

/* WORLD */

const WORLD_WIDTH = 5000

let cameraX = 0

/* PLAYER */

let player={
x:200,
y:0,
width:64,
height:64,
vx:0,
vy:0,
ground:false,
frame:0,
animTimer:0,
facing:"right"
}

const gravity = 0.8
const floorY = canvas.height - 80

/* INPUT */

let keys={}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

/* UPDATE PLAYER */

function updatePlayer(){

player.vx=0

if(keys["a"] || keys["arrowleft"]){
player.vx=-5
player.facing="left"
}

if(keys["d"] || keys["arrowright"]){
player.vx=5
player.facing="right"
}

if((keys["w"]||keys[" "]||keys["arrowup"]) && player.ground){
player.vy=-15
player.ground=false
}

player.x+=player.vx

player.vy+=gravity
player.y+=player.vy

if(player.y+player.height>floorY){
player.y=floorY-player.height
player.vy=0
player.ground=true
}

/* WALK ANIMATION */

if(player.vx!==0 && player.ground){
player.animTimer++
if(player.animTimer>10){
player.frame=(player.frame+1)%2
player.animTimer=0
}
}

/* CAMERA FOLLOW */

cameraX = player.x - canvas.width/2

if(cameraX<0) cameraX=0
if(cameraX>WORLD_WIDTH-canvas.width)
cameraX=WORLD_WIDTH-canvas.width

}

/* BACKGROUND */

function drawBackground(){

let bgWidth=bg.width

for(let x=-cameraX*0.3; x<canvas.width; x+=bgWidth){

ctx.drawImage(bg,x,0,bgWidth,canvas.height)

}

}

/* FLOOR */

function drawFloor(){

for(let x=0;x<WORLD_WIDTH;x+=64){

ctx.drawImage(
floorImg,
x-cameraX,
floorY,
64,
64
)

}

}

/* PLAYER */

function drawPlayer(){

let sprite=idle

if(keys["s"]||keys["arrowdown"]){
sprite=crouch
}
else if(!player.ground){
sprite=jump
}
else if(player.vx!==0){
sprite=player.frame===0?walk1:walk2
}

ctx.save()

if(player.facing==="left"){

ctx.scale(-1,1)

ctx.drawImage(
sprite,
-(player.x-cameraX)-player.width,
player.y,
player.width,
player.height
)

}else{

ctx.drawImage(
sprite,
player.x-cameraX,
player.y,
player.width,
player.height
)

}

ctx.restore()

}

/* GAME LOOP */

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()

updatePlayer()

drawFloor()

drawPlayer()

requestAnimationFrame(gameLoop)

}

/* MENU */

function menuLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)
drawBackground()
requestAnimationFrame(menuLoop)

}

menuLoop()

/* UI */

const startButton=document.getElementById("startButton")
const titleOverlay=document.getElementById("titleOverlay")
const charChooser=document.getElementById("charChooser")

startButton.onclick=()=>{
titleOverlay.style.display="none"
charChooser.style.display="flex"
}

document.getElementById("villagerSelect").onclick=()=>{
charChooser.style.display="none"
gameLoop()
}

</script>

</body>
</html>
