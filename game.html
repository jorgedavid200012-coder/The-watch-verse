<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weirdmageddon: Apocalypse</title>
<style>
/* Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* Fullscreen */
body, html {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: "Press Start 2P", monospace;
}

/* Video intro */
#introVideo {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Title screen */
#titleScreen {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('8bitbg.png') repeat-x;
  background-size: auto 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 8-bit styled title */
#gameTitle {
  color: red;
  font-size: 60px;
  text-shadow: 4px 4px 0 black, -2px 2px 0 black;
  font-family: "Press Start 2P", monospace;
  margin-bottom: 50px;
  text-align: center;
}

/* Start button */
#startButton {
  padding: 20px 50px;
  font-size: 20px;
  font-family: "Press Start 2P", monospace;
  background: black;
  color: red;
  border: 3px solid red;
  cursor: pointer;
  transition: all 0.2s;
}

#startButton:hover {
  background: red;
  color: black;
}

/* Character chooser */
#charChooser {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('8bitbg.png') repeat-x;
  background-size: auto 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: red;
}

#charChooser h2 {
  font-family: "Press Start 2P", monospace;
  font-size: 32px;
  margin-bottom: 30px;
  text-shadow: 2px 2px 0 black;
}

#characters {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
}

.charCard {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  border: 3px solid red;
  padding: 10px;
  transition: transform 0.2s, background 0.2s;
}

.charCard:hover {
  transform: scale(1.1);
  background: rgba(255,0,0,0.2);
}

.charCard img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  margin-bottom: 10px;
}

.charCard span {
  font-family: "Press Start 2P", monospace;
  font-size: 16px;
}
</style>
</head>
<body>

<!-- Intro video -->
<video id="introVideo" autoplay muted>
  <source src="backgroundVideo.mp4" type="video/mp4">
</video>

<!-- Title screen -->
<div id="titleScreen">
  <div id="gameTitle">WEIRDMAGEDDON</div>
  <button id="startButton">START</button>
</div>

<!-- Character chooser -->
<div id="charChooser">
  <h2>Choose Your Character</h2>
  <div id="characters">
    <div class="charCard" data-character="villager">
      <img src="characters/villager_boy/idle.png" alt="Villager">
      <span>Villager</span>
    </div>
    <div class="charCard" data-character="sonic">
      <img src="characters/sonic/idle.png" alt="Sonic">
      <span>Sonic</span>
    </div>
    <div class="charCard" data-character="mario">
      <img src="characters/mario/idle.png" alt="Mario">
      <span>Mario</span>
    </div>
  </div>
</div>

<script>
const introVideo = document.getElementById('introVideo');
const titleScreen = document.getElementById('titleScreen');
const startButton = document.getElementById('startButton');
const charChooser = document.getElementById('charChooser');
const charCards = document.querySelectorAll('.charCard');

// Step 1: Play intro for ~3 seconds then show title screen
introVideo.addEventListener('loadedmetadata', () => {
  setTimeout(() => {
    introVideo.style.display = 'none';
    titleScreen.style.display = 'flex';
  }, 3000);
});

// Step 2: Start button shows character chooser
startButton.addEventListener('click', () => {
  titleScreen.style.display = 'none';
  charChooser.style.display = 'flex';
});

// Step 3: Character selection
charCards.forEach(card => {
  card.addEventListener('click', () => {
    const selectedChar = card.getAttribute('data-character');
    console.log("Selected character:", selectedChar);
    alert("You selected: " + selectedChar + "\nGame will start here!");
    // Here we will later start the actual side-scroller game using selectedChar
  });
});
</script>
</body>
</html>
