<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weirdmageddon: Apocalypse</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body, html { margin:0; padding:0; overflow:hidden; font-family:'Press Start 2P', monospace; background:black; }
canvas{display:block;}
#bgCanvas{ position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#gameCanvas{ position:absolute; top:0; left:0; z-index:2; }
#titleOverlay, #charChooser{
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  color:red; text-align:center; z-index:3; pointer-events:auto;
}
#gameTitle{font-size:60px; text-shadow:0 0 10px black; margin-bottom:40px;}
button{
  font-family:'Press Start 2P', monospace;
  font-size:18px;
  padding:15px 30px;
  background:black;
  color:red;
  border:3px solid red;
  cursor:pointer;
  transition:0.2s;
}
button:hover{background:red;color:black;}
#characters{display:flex; gap:40px; flex-wrap:wrap; justify-content:center;}
.charCard{display:flex; flex-direction:column; align-items:center; cursor:pointer; border:3px solid red; padding:10px; transition:0.2s;}
.charCard:hover{transform:scale(1.1); background:rgba(255,0,0,0.2);}
.charCard img{width:100px; height:100px; object-fit:contain; margin-bottom:10px;}
.charCard span{font-size:16px;}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="titleOverlay">
  <div id="gameTitle">WEIRDMAGEDDON</div>
  <button id="startButton">START</button>
</div>

<div id="charChooser" style="display:none;">
  <h2>Choose Your Character</h2>
  <div id="characters"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// --- Canvas setup
const bgCanvas = document.getElementById("bgCanvas");
const bgCtx = bgCanvas.getContext("2d");
const gameCanvas = document.getElementById("gameCanvas");
const ctx = gameCanvas.getContext("2d");

function resizeCanvas(){
  bgCanvas.width = gameCanvas.width = window.innerWidth;
  bgCanvas.height = gameCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// --- Background image
const bgImage = new Image();
bgImage.src = "8bitbg.png";
let bgX = 0;
let autoScroll = true;

// --- Title screen overlay
const startButton = document.getElementById("startButton");
const titleOverlay = document.getElementById("titleOverlay");
const charChooser = document.getElementById("charChooser");
const charactersDiv = document.getElementById("characters");
let selectedChar = null;

// --- Characters
const charactersData = [
  {id:'villager', name:'Villager', folder:'characters/villager/', sprites:['idle','walk1','walk2','jump','crouch','damaged']},
  {id:'sonic', name:'Sonic', folder:'characters/sonic/', sprites:['idle','walk1','walk2','jump']},
  {id:'mario', name:'Mario', folder:'characters/mario/', sprites:['idle','walk1','walk2','jump']},
  {id:'bill', name:'Bill Cipher', folder:'characters/bill_cipher/', sprites:['idle','walk1','walk2','jump']}
];

// --- Load sprites
const loadedSprites = {};
charactersData.forEach(c=>{
  loadedSprites[c.id]={};
  c.sprites.forEach(anim=>{
    const img = new Image();
    if(c.id==='villager') img.src = c.folder+anim+'.png';
    else img.src = c.folder+c.id.charAt(0)+anim+'.png'; // e.g., swalk1.png
    loadedSprites[c.id][anim] = img;
  });
});

// --- Start button click
startButton.addEventListener("click", ()=>{
  titleOverlay.style.display="none";
  charChooser.style.display="flex";
  autoScroll = true; // keep background moving slowly for chooser
  showCharacterChooser();
});

// --- Character chooser
function showCharacterChooser(){
  charactersDiv.innerHTML='';
  charactersData.forEach(c=>{
    const card = document.createElement('div');
    card.className='charCard';
    const firstSprite = c.id==='villager'? 'idle.png' : c.id.charAt(0)+c.sprites[0]+'.png';
    card.innerHTML=`<img src="${c.folder}${firstSprite}"><span>${c.name}</span>`;
    charactersDiv.appendChild(card);
    card.addEventListener('click', ()=>{
      selectedChar = c;
      charChooser.style.display='none';
      autoScroll=false;
      startGame(selectedChar);
    });
  });
}

// --- Floor
const floorImg = new Image();
floorImg.src = "floor.png";

// --- Player and camera
let player, cameraX = 0;
const gravity = 0.6;
let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// --- Start game
function startGame(char){
  player = {
    x:100, y:gameCanvas.height-120,
    width:50, height:60,
    velX:0, velY:0, speed:4, jumpPower:-12, jumping:true,
    character:char.id, damaged:false, damageTimer:0
  };
  gameLoop();
}

// --- Update
let walkTimer=0;
function update(){
  if(keys["ArrowRight"]||keys["d"]) player.velX = player.speed;
  else if(keys["ArrowLeft"]||keys["a"]) player.velX = -player.speed;
  else player.velX = 0;

  if((keys[" "]||keys["w"]) && !player.jumping){
    player.velY = player.jumpPower;
    player.jumping = true;
  }

  player.velY += gravity;
  player.x += player.velX;
  player.y += player.velY;

  const floorY = gameCanvas.height - 64;
  if(player.y + player.height >= floorY){
    player.y = floorY - player.height;
    player.velY = 0;
    player.jumping = false;
  }

  if(keys["h"] && !player.damaged){
    player.damaged = true;
    player.damageTimer = 30;
  }
  if(player.damaged){
    player.damageTimer--;
    if(player.damageTimer<=0) player.damaged=false;
  }

  cameraX = player.x - gameCanvas.width/2;
  if(cameraX<0) cameraX=0;
}

// --- Draw
function draw(){
  ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

  // Draw floor
  const floorY = gameCanvas.height - 64;
  for(let x=0;x<5000;x+=64){
    ctx.drawImage(floorImg, x-cameraX, floorY, 64, 64);
  }

  // Draw player
  const charSprites = loadedSprites[player.character];
  let img;
  if(player.damaged) img = charSprites.damaged;
  else if(player.jumping) img = charSprites.jump;
  else if(keys["ArrowLeft"]||keys["ArrowRight"]||keys["a"]||keys["d"]){
    walkTimer++;
    img = (walkTimer%20<10)?charSprites.walk1:charSprites.walk2;
  } else img = charSprites.crouch || charSprites.idle;
  else img = charSprites.idle;

  ctx.drawImage(img, player.x-cameraX, player.y, player.width, player.height);

  // Draw background
  const imgHeight = bgCanvas.height;
  const imgWidth = bgImage.width * (imgHeight/bgImage.height);
  let drawX = autoScroll ? bgX : -cameraX*0.5;
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  for(let i=-imgWidth; i<bgCanvas.width+imgWidth; i+=imgWidth){
    bgCtx.drawImage(bgImage, i+drawX, 0, imgWidth, imgHeight);
  }
  if(autoScroll){
    bgX -= 0.2;
    if(bgX <= -imgWidth) bgX = 0;
  }
}

// --- Game loop
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
