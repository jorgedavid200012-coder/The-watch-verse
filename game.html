<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Watch Verse</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering:pixelated;
}

</style>

</head>

<body>

<canvas id="game"></canvas>

<script>

/* =========================
CANVAS
========================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);



/* =========================
CHARACTER SELECTION
========================= */

let character = localStorage.getItem("character") || "villigear";



/* =========================
LOAD IMAGES
========================= */

function load(src){
let img = new Image();
img.src = src;
return img;
}

const sprites = {

idle: load(character+"idle.png"),
walk1: load(character+"walk1.png"),
walk2: load(character+"walk2.png"),
jump: load(character+"jump.png"),
crouch: load(character+"crouch.png")

};

const background = load("8bitbg.png");
const floor = load("floor.png");



/* =========================
CHARACTER STATS
========================= */

const stats = {

villigear:{speed:4,jump:16},
sonic:{speed:7,jump:14},
mario:{speed:4,jump:20},
bill:{speed:4,jump:16,hover:true}

};



/* =========================
PLAYER
========================= */

let player = {

x:200,
y:300,

vx:0,
vy:0,

width:70,
height:70,

ground:false,

direction:1,

walkFrame:0,

hoverTimer:0

};



let gravity = 0.7;
let friction = 0.90;

let cameraX = 0;



/* =========================
INPUT
========================= */

const keys = {};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false;
});



/* =========================
UPDATE
========================= */

function update(){

let s = stats[character];

/* movement */

if(keys["arrowright"] || keys["d"]){

player.vx += 0.5;
player.direction = 1;

}

if(keys["arrowleft"] || keys["a"]){

player.vx -= 0.5;
player.direction = -1;

}


/* slippery */

player.vx *= friction;


/* jump */

if((keys[" "] || keys["arrowup"]) && player.ground){

player.vy = -s.jump;
player.ground = false;

}

/* bill hover */

if(!player.ground && s.hover){

if(keys[" "] && player.hoverTimer < 180){

player.vy = -2;
player.hoverTimer++;

}

}


/* gravity */

player.vy += gravity;

player.x += player.vx;
player.y += player.vy;


/* floor collision */

if(player.y > canvas.height-160){

player.y = canvas.height-160;
player.vy = 0;
player.ground = true;
player.hoverTimer = 0;

}


/* camera */

cameraX = player.x - canvas.width/2;

}



/* =========================
SPRITE SELECT
========================= */

function currentSprite(){

if(!player.ground) return sprites.jump;

if(keys["arrowdown"] || keys["s"]) return sprites.crouch;

if(Math.abs(player.vx) > 1){

player.walkFrame += 0.2;

if(Math.floor(player.walkFrame)%2==0)
return sprites.walk1;

return sprites.walk2;

}

return sprites.idle;

}



/* =========================
DRAW BACKGROUND
========================= */

function drawBackground(){

if(!background.complete) return;

let width = background.width;

let start = -cameraX % width;

for(let i=-1;i<3;i++){

ctx.drawImage(
background,
start + i*width,
0,
width,
canvas.height
);

}

}



/* =========================
DRAW FLOOR
========================= */

function drawFloor(){

if(!floor.complete) return;

for(let i=-10;i<50;i++){

ctx.drawImage(
floor,
i*floor.width - cameraX,
canvas.height-100
);

}

}



/* =========================
DRAW PLAYER
========================= */

function drawPlayer(){

let sprite = currentSprite();

if(!sprite.complete) return;

ctx.save();

ctx.translate(player.x - cameraX, player.y);

if(player.direction == -1){

ctx.scale(-1,1);
ctx.drawImage(sprite,-40,-60,80,80);

}else{

ctx.drawImage(sprite,-40,-60,80,80);

}

ctx.restore();

}



/* =========================
GAME LOOP
========================= */

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

update();

drawBackground();
drawFloor();
drawPlayer();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
