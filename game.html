<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Watch Verse</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:'Press Start 2P',cursive;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
image-rendering:pixelated;
}

#ui{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

button{

font-family:'Press Start 2P';
padding:18px;
margin:10px;
font-size:12px;

background:black;
color:white;

border:3px solid white;

cursor:pointer;

}

button:hover{

background:white;
color:black;

}

</style>
</head>


<body>

<div id="ui">

<h1>WATCH VERSE</h1>

<div id="menu">

<button onclick="openSelect()">START</button>

</div>

<div id="select" style="display:none">

<h2>Choose Character</h2>

<button onclick="chooseCharacter('villigear')">VILLIGEAR</button>
<button onclick="chooseCharacter('sonic')">SONIC</button>
<button onclick="chooseCharacter('mario')">MARIO</button>

</div>

</div>


<canvas id="game"></canvas>


<script>

/* CANVAS */

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

function resize(){

canvas.width = window.innerWidth
canvas.height = window.innerHeight

}

resize()

window.addEventListener("resize",resize)



/* GAME STATE */

let state = "menu"



/* BACKGROUND */

const bg = new Image()
bg.src = "8bitbg.png"

let bgOffset = 0



/* FLOOR */

const floor = new Image()
floor.src = "floor.png"



/* PLAYER */

let character = null

let sprites = {}

let player = {

x:200,
y:200,

vx:0,
vy:0,

dir:1,

ground:false,

frame:0

}

let cameraX = 0



/* CHARACTER STATS */

const stats = {

villigear:{speed:0.6,jump:16},
sonic:{speed:1.2,jump:14},
mario:{speed:0.6,jump:20},
bill:{speed:0.6,jump:16}

}



/* INPUT */

const keys = {}

document.addEventListener("keydown",e=>{

keys[e.key.toLowerCase()] = true

})

document.addEventListener("keyup",e=>{

keys[e.key.toLowerCase()] = false

})



/* MENU */

function openSelect(){

document.getElementById("menu").style.display="none"
document.getElementById("select").style.display="block"

state = "select"

}



/* CHARACTER SELECT */

function chooseCharacter(name){

character = name

loadSprites()

document.getElementById("ui").style.display="none"

state = "game"

}



/* LOAD SPRITES */

function loadSprites(){

sprites = {

idle:new Image(),
walk1:new Image(),
walk2:new Image(),
jump:new Image(),
crouch:new Image()

}

/* Villigear has NO prefix */

if(character==="villigear"){

sprites.idle.src="idle.png"
sprites.walk1.src="walk1.png"
sprites.walk2.src="walk2.png"
sprites.jump.src="jump.png"
sprites.crouch.src="crouch.png"

}

/* Other characters */

else{

sprites.idle.src=character+"idle.png"
sprites.walk1.src=character+"walk1.png"
sprites.walk2.src=character+"walk2.png"
sprites.jump.src=character+"jump.png"
sprites.crouch.src=character+"crouch.png"

}

}



/* UPDATE GAME */

function update(){

let s = stats[character]

if(keys["arrowright"] || keys["d"]){

player.vx += s.speed
player.dir = 1

}

if(keys["arrowleft"] || keys["a"]){

player.vx -= s.speed
player.dir = -1

}

/* slippery movement */

player.vx *= 0.9


/* jump */

if((keys[" "] || keys["arrowup"]) && player.ground){

player.vy = -s.jump
player.ground = false

}


/* gravity */

player.vy += 0.8

player.x += player.vx
player.y += player.vy


/* FIXED GROUND (matches floor tile) */

let ground = canvas.height - 60

if(player.y > ground){

player.y = ground
player.vy = 0
player.ground = true

}


/* camera */

cameraX = player.x - canvas.width/2

}



/* SPRITE SELECTION */

function getSprite(){

if(!player.ground)
return sprites.jump

if(keys["arrowdown"] || keys["s"])
return sprites.crouch

if(Math.abs(player.vx)>1){

player.frame += 0.2

if(Math.floor(player.frame)%2==0)
return sprites.walk1
else
return sprites.walk2

}

return sprites.idle

}



/* DRAW BACKGROUND */

function drawBackground(){

if(!bg.complete) return

let w = bg.width

/* slow move in menus */

if(state==="menu" || state==="select"){

bgOffset += 0.2

}

/* follow camera in game */

if(state==="game"){

bgOffset = cameraX * 0.5

}

let start = -bgOffset % w

for(let i=-2;i<5;i++){

ctx.drawImage(bg,start+i*w,0,w,canvas.height)

}

}



/* DRAW FLOOR */

function drawFloor(){

let tile = floor.width || 64

for(let i=-20;i<100;i++){

let x = i*tile - cameraX

if(floor.complete)
ctx.drawImage(floor,x,canvas.height-60)

}

}



/* DRAW PLAYER */

function drawPlayer(){

if(!character) return

let img = getSprite()

ctx.save()

ctx.translate(player.x-cameraX,player.y)

if(player.dir==-1)
ctx.scale(-1,1)

if(img && img.complete){

/* FIXED FEET POSITION */
ctx.drawImage(img,-40,-80,80,80)

}

else{

ctx.fillStyle="red"
ctx.fillRect(-20,-40,40,40)

}

ctx.restore()

}



/* GAME LOOP */

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBackground()

if(state==="game"){

update()

drawFloor()

drawPlayer()

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>

</html>
